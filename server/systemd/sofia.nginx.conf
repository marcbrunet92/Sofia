server {
    listen 80;
    server_name sofia.lemarc.fr;

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SSL configuration — add your certbot / Let's Encrypt block here:
    # listen 443 ssl;
    # ssl_certificate     /etc/letsencrypt/live/sofia.lemarc.fr/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/sofia.lemarc.fr/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;
}
